<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxelcraft: Origins</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'VT323', monospace; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        
        /* UI Elements */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
            transform: translate(-50%, -50%); pointer-events: none;
            display: flex; justify-content: center; align-items: center;
            opacity: 0.8;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background-color: rgba(255, 255, 255, 1);
            box-shadow: 0 0 2px rgba(0,0,0,1);
        }
        #crosshair::before { width: 4px; height: 100%; }
        #crosshair::after { width: 100%; height: 4px; }
        
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            text-shadow: 2px 2px 0px #3f3f3f; pointer-events: none;
            font-size: 24px;
        }
        
        /* Minecraft Style Hotbar */
        #hotbar-container {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 0; background: #8b8b8b; padding: 4px; 
            border: 2px solid #373737; border-top-color: #ffffff; border-left-color: #ffffff;
            border-bottom-color: #373737; border-right-color: #373737;
        }
        .slot {
            width: 48px; height: 48px; background: #8b8b8b;
            border: 2px solid #373737; border-top-color: #373737; border-left-color: #373737;
            border-bottom-color: #ffffff; border-right-color: #ffffff;
            color: white; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; 
            font-weight: bold; font-size: 20px; text-shadow: 2px 2px 0px #3f3f3f;
            position: relative; box-sizing: border-box;
            background-size: 32px 32px; background-position: center; background-repeat: no-repeat;
        }
        .slot.active { 
            border: 2px solid #ffffff; box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
            outline: 2px solid #000; z-index: 2;
        }
        
        /* Menus */
        #pause-menu, #instructions, #inventory-menu {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.6); color: white; z-index: 10;
        }
        #pause-menu, #inventory-menu { display: none; }
        
        /* Minecraft Style Inventory */
        .inv-window {
            background: #c6c6c6; border: 4px solid #000; border-top-color: #fff; border-left-color: #fff;
            border-bottom-color: #555; border-right-color: #555;
            padding: 20px; width: 600px; color: #373737; text-shadow: none;
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .inv-title { font-size: 32px; margin-bottom: 10px; font-family: 'Press Start 2P', cursive; font-size: 16px;}
        .inventory-grid {
            display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px;
            background: #c6c6c6; margin-bottom: 20px;
        }
        .inv-slot {
            width: 52px; height: 52px; background: #8b8b8b;
            border: 2px solid #373737; border-top-color: #373737; border-left-color: #373737;
            border-bottom-color: #ffffff; border-right-color: #ffffff;
            cursor: pointer; position: relative;
            background-size: 36px 36px; background-position: center; background-repeat: no-repeat;
        }
        .inv-slot:hover { background-color: #a0a0a0; }
        .inv-slot::after {
            content: attr(data-item); position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 2px 4px; font-size: 16px;
            white-space: nowrap; display: none; z-index: 5; text-shadow: 2px 2px 0px #3f3f3f;
        }
        .inv-slot:hover::after { display: block; }
        
        h1 {
            font-family: 'Press Start 2P', cursive; font-size: 36px; margin-bottom: 10px;
            text-shadow: 4px 4px 0px #3f3f3f; color: #fff; text-align: center; line-height: 1.4;
        }
        
        .mc-btn {
            background: #c6c6c6; border: 3px solid #000; border-top-color: #fff; border-left-color: #fff;
            border-bottom-color: #555; border-right-color: #555;
            padding: 10px 40px; font-family: 'VT323', monospace; font-size: 32px; color: #000;
            cursor: pointer; margin: 10px; text-transform: uppercase; text-shadow: 1px 1px 0px #fff;
        }
        .mc-btn:hover { background: #5e81ce; color: #fff; border-top-color: #7d9eeb; border-left-color: #7d9eeb; border-bottom-color: #384d7a; border-right-color: #384d7a; text-shadow: 2px 2px 0px #3f3f3f; }
        .mc-btn:active { border-top-color: #555; border-left-color: #555; border-bottom-color: #fff; border-right-color: #fff; }
        
        .controls-list { font-size: 24px; text-align: left; margin-bottom: 30px; }
        .controls-list p { margin: 10px 0; }
        .key { color: #ffff00; text-shadow: 2px 2px 0px #3f3f3f; }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>VOLTCRAFT</h1>
        <div class="controls-list">
            <p><span class="key">MOUSE</span> Look Around</p>
            <p><span class="key">L-CLICK</span> Break Block / Attack</p>
            <p><span class="key">R-CLICK</span> Place Block / Use</p>
            <p><span class="key">WASD</span> Move</p>
            <p><span class="key">SPACE</span> Jump (Double tap to fly)</p>
            <p><span class="key">E</span> Inventory</p>
            <p><span class="key">V</span> 1st/3rd Person</p>
            <p><span class="key">ESC</span> Pause</p>
        </div>
        <button class="mc-btn" id="start-btn">Back to Game</button>
    </div>
    
    <div id="pause-menu">
        <h1>Game Menu</h1>
        <button class="mc-btn" id="resume-btn">Back to Game</button>
        <button class="mc-btn" id="regen-btn">Regenerate World</button>
    </div>
    
    <div id="inventory-menu">
        <div class="inv-window">
            <div class="inv-title">Inventory</div>
            <div class="inventory-grid" id="inventory-grid"></div>
        </div>
    </div>
    
    <div id="crosshair"></div>
    <div id="ui">Voltcraft v1.1</div>
    
    <div id="hotbar-container">
        <!-- Populated by JS -->
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
