<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voltcraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'VT323', monospace; user-select: none; -webkit-user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
            transform: translate(-50%, -50%); pointer-events: none;
            display: flex; justify-content: center; align-items: center;
            opacity: 0.8; z-index: 4;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background-color: rgba(255, 255, 255, 1);
            box-shadow: 0 0 2px rgba(0,0,0,1);
        }
        #crosshair::before { width: 4px; height: 100%; }
        #crosshair::after { width: 100%; height: 4px; }
        
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            text-shadow: 2px 2px 0px #3f3f3f; pointer-events: none;
            font-size: 24px; z-index: 4;
        }
        
        
        #hotbar-container {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 0; background: #8b8b8b; padding: 4px; 
            border: 2px solid #373737; border-top-color: #ffffff; border-left-color: #ffffff;
            border-bottom-color: #373737; border-right-color: #373737; z-index: 6;
        }
        .slot {
            width: 48px; height: 48px; background: #8b8b8b;
            border: 2px solid #373737; border-top-color: #373737; border-left-color: #373737;
            border-bottom-color: #ffffff; border-right-color: #ffffff;
            color: white; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; 
            font-weight: bold; font-size: 20px; text-shadow: 2px 2px 0px #3f3f3f;
            position: relative; box-sizing: border-box; cursor: pointer;
            background-size: 32px 32px; background-position: center; background-repeat: no-repeat;
        }
        .slot.active { 
            border: 2px solid #ffffff; box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
            outline: 2px solid #000; z-index: 2;
        }
        
        
        #pause-menu, #instructions, #inventory-menu {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.6); color: white; z-index: 10;
        }
        #pause-menu, #inventory-menu { display: none; }
        
        
        .inv-window {
            background: #c6c6c6; border: 4px solid #000; border-top-color: #fff; border-left-color: #fff;
            border-bottom-color: #555; border-right-color: #555;
            padding: 20px; max-width: 90vw; color: #373737; text-shadow: none;
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .inv-title { font-size: 32px; margin-bottom: 10px; font-family: 'Press Start 2P', cursive; font-size: 16px;}
        .inventory-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(48px, 1fr)); gap: 4px;
            background: #c6c6c6; margin-bottom: 20px; width: 100%; max-height: 50vh; overflow-y: auto;
        }
        .inv-slot {
            width: 48px; height: 48px; background: #8b8b8b;
            border: 2px solid #373737; border-top-color: #373737; border-left-color: #373737;
            border-bottom-color: #ffffff; border-right-color: #ffffff;
            cursor: pointer; position: relative;
            background-size: 32px 32px; background-position: center; background-repeat: no-repeat;
        }
        .inv-slot:hover { background-color: #a0a0a0; }
        .inv-slot::after {
            content: attr(data-item); position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 2px 4px; font-size: 16px;
            white-space: nowrap; display: none; z-index: 5; text-shadow: 2px 2px 0px #3f3f3f;
        }
        .inv-slot:hover::after { display: block; }
        
        h1 {
            font-family: 'Press Start 2P', cursive; font-size: 36px; margin-bottom: 10px;
            text-shadow: 4px 4px 0px #3f3f3f; color: #fff; text-align: center; line-height: 1.4;
        }
        
        .mc-btn {
            background: #c6c6c6; border: 3px solid #000; border-top-color: #fff; border-left-color: #fff;
            border-bottom-color: #555; border-right-color: #555;
            padding: 10px 40px; font-family: 'VT323', monospace; font-size: 32px; color: #000;
            cursor: pointer; margin: 10px; text-transform: uppercase; text-shadow: 1px 1px 0px #fff;
        }
        .mc-btn:hover { background: #5e81ce; color: #fff; border-top-color: #7d9eeb; border-left-color: #7d9eeb; border-bottom-color: #384d7a; border-right-color: #384d7a; text-shadow: 2px 2px 0px #3f3f3f; }
        .mc-btn:active { border-top-color: #555; border-left-color: #555; border-bottom-color: #fff; border-right-color: #fff; }
        
        .controls-list { font-size: 24px; text-align: left; margin-bottom: 30px; }
        .controls-list p { margin: 10px 0; }
        .key { color: #ffff00; text-shadow: 2px 2px 0px #3f3f3f; }

        /* Social Footer */
        .social-footer {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 20px;
            color: #ccc;
        }
        .social-footer p {
            margin-bottom: 15px;
            text-shadow: 2px 2px 0px #000;
        }
        .social-links {
            display: flex;
            gap: 20px;
        }
        .social-icon {
            width: 32px;
            height: 32px;
            transition: transform 0.2s;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.8));
        }
        .social-icon:hover {
            transform: scale(1.2);
        }
        .social-icon.invert {
            filter: invert(1) drop-shadow(-2px -2px 0px rgba(0,0,0,0.8));
        }

        /* Mobile Controls */
        #mobile-controls {
            display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 5;
        }
        #dpad {
            position: absolute; bottom: 80px; left: 20px; width: 160px; height: 160px;
            pointer-events: auto;
        }
        .dbtn {
            position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.4);
            border: 2px solid rgba(0,0,0,0.5); border-radius: 8px; display: flex; justify-content: center;
            align-items: center; font-size: 24px; font-weight: bold; color: #000;
        }
        .dbtn:active { background: rgba(255,255,255,0.8); }
        #btn-up { top: 0; left: 55px; }
        #btn-left { top: 55px; left: 0; }
        #btn-right { top: 55px; left: 110px; }
        #btn-down { top: 110px; left: 55px; }

        #action-btns {
            position: absolute; bottom: 80px; right: 20px; pointer-events: auto;
            display: grid; grid-template-columns: 60px 60px; gap: 10px;
        }
        .abtn {
            width: 60px; height: 60px; background: rgba(255,255,255,0.4);
            border: 2px solid rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 16px; font-weight: bold; color: #000;
        }
        .abtn:active { background: rgba(255,255,255,0.8); }
        #btn-jump { grid-column: span 2; width: 130px; border-radius: 12px; }
        
        #top-btns {
            position: absolute; top: 10px; right: 10px; pointer-events: auto;
            display: flex; gap: 10px;
        }
        .tbtn {
            width: 40px; height: 40px; background: rgba(255,255,255,0.4);
            border: 2px solid rgba(0,0,0,0.5); border-radius: 8px; display: flex; justify-content: center;
            align-items: center; font-size: 14px; font-weight: bold; color: #000;
        }
        .tbtn:active { background: rgba(255,255,255,0.8); }
        
        @media (max-width: 768px) {
            #hotbar-container { bottom: 10px; transform: translateX(-50%) scale(0.8); transform-origin: bottom center; }
            .inv-grid { grid-template-columns: repeat(5, 1fr); }
            h1 { font-size: 24px; }
            .mc-btn { font-size: 20px; padding: 10px 20px; }
            .controls-list { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>VOLTCRAFT</h1>
        <div class="controls-list">
            <p><span class="key">MOUSE/TOUCH</span> Look Around</p>
            <p><span class="key">L-CLICK/BREAK</span> Break Block</p>
            <p><span class="key">R-CLICK/PLACE</span> Place Block</p>
            <p><span class="key">WASD/DPAD</span> Move</p>
            <p><span class="key">SPACE/JUMP</span> Jump (Double to fly)</p>
            <p><span class="key">E/INV</span> Inventory</p>
            <p><span class="key">V/CAM</span> 1st/3rd Person</p>
            <p><span class="key">ESC</span> Pause</p>
        </div>
        <button class="mc-btn" id="start-btn">Enter World</button>
        <div class="social-footer">
            <p>built by bxzex</p>
            <div class="social-links">
                <a href="https://github.com/bxzex" target="_blank" title="GitHub">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg" alt="GitHub" class="social-icon invert">
                </a>
                <a href="https://www.instagram.com/bxzex/" target="_blank" title="Instagram">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram" class="social-icon">
                </a>
                <a href="https://www.linkedin.com/in/bxzex/" target="_blank" title="LinkedIn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png" alt="LinkedIn" class="social-icon">
                </a>
            </div>
        </div>
    </div>
    
    <div id="pause-menu">
        <h1>Game Paused</h1>
        <button class="mc-btn" id="resume-btn">Resume</button>
        <button class="mc-btn" id="regen-btn">Regenerate World</button>
    </div>
    
    <div id="inventory-menu">
        <div class="inv-window">
            <div class="inv-title">Inventory</div>
            <div class="inventory-grid" id="inventory-grid"></div>
            <button class="mc-btn" id="close-inv-btn" style="align-self: center;">Close</button>
        </div>
    </div>
    
    <div id="crosshair"></div>
    <div id="ui">Voltcraft v1.2</div>
    
    <div id="hotbar-container">
        <!-- Populated by JS -->
    </div>
    
    <!-- Mobile UI Overlays -->
    <div id="mobile-controls">
        <div id="top-btns">
            <div class="tbtn" id="btn-inv">INV</div>
            <div class="tbtn" id="btn-cam">CAM</div>
            <div class="tbtn" id="btn-pause">||</div>
        </div>
        <div id="dpad">
            <div class="dbtn" id="btn-up">▲</div>
            <div class="dbtn" id="btn-left">◀</div>
            <div class="dbtn" id="btn-right">▶</div>
            <div class="dbtn" id="btn-down">▼</div>
        </div>
        <div id="action-btns">
            <div class="abtn" id="btn-break">Break</div>
            <div class="abtn" id="btn-place">Place</div>
            <div class="abtn" id="btn-jump">Jump</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
