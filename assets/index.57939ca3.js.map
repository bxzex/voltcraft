export default "<div class=\"joystick\">\n    <div id=\"dpad\">\n        <div class=\"dbtn\" id=\"action-front\"></div>\n        <div class=\"dbtn\" id=\"action-left\"></div>\n        <div class=\"dbtn\" id=\"action-right\"></div>\n        <div class=\"dbtn\" id=\"action-back\"></div>\n    </div>\n\n    <div id=\"top-btns\">\n        <div class=\"top-btn\" id=\"action-pause\">\n            <svg viewBox=\"0 0 24 24\"><path d=\"M6 19h4V5H6v14zm8-14v14h4V5h-4z\" fill=\"white\"/></svg>\n        </div>\n        <div class=\"top-btn\" id=\"action-inventory\">\n            <svg viewBox=\"0 0 24 24\"><path d=\"M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 10H5V6h7v8zm7 0h-5V6h5v8zm-7 4H5v-2h7v2zm7 0h-5v-2h5v2z\" fill=\"white\"/></svg>\n        </div>\n    </div>\n\n    <div id=\"action-btns\">\n        <div class=\"abtn\" id=\"action-jump\"></div>\n        <div class=\"abtn\" id=\"action-break\">BREAK</div>\n        <div class=\"abtn\" id=\"action-place\">PLACE</div>\n    </div>\n</div>\n\n<style>\n    .joystick {\n        position: fixed;\n        top: 0;\n        left: 0;\n        width: 100%;\n        height: 100%;\n        pointer-events: none;\n        z-index: 100;\n        font-family: Minecraft, sans-serif;\n        user-select: none;\n        -webkit-user-select: none;\n        -webkit-touch-callout: none;\n        -webkit-tap-highlight-color: transparent;\n    }\n\n    #dpad, #action-btns, #top-btns {\n        pointer-events: auto;\n        -webkit-touch-callout: none;\n        -webkit-user-select: none;\n        user-select: none;\n    }\n\n    .dbtn, .abtn, .top-btn {\n        -webkit-touch-callout: none;\n        -webkit-user-select: none;\n        user-select: none;\n        touch-action: none;\n    }\n\n    #dpad {\n        position: absolute;\n        bottom: 40px;\n        left: 40px;\n        width: 180px;\n        height: 180px;\n        display: grid;\n        grid-template-columns: repeat(3, 60px);\n        grid-template-rows: repeat(3, 60px);\n    }\n\n    .dbtn {\n        width: 60px;\n        height: 60px;\n        background-size: 100% 100%;\n        image-rendering: pixelated;\n        background-repeat: no-repeat;\n    }\n\n    #action-front { \n        grid-column: 2; grid-row: 1; \n        background-image: url('textures/ui/up.png');\n    }\n    #action-front:active { background-image: url('textures/ui/up_pressed.png'); }\n\n    #action-left { \n        grid-column: 1; grid-row: 2; \n        background-image: url('textures/ui/left.png');\n    }\n    #action-left:active { background-image: url('textures/ui/left_pressed.png'); }\n\n    #action-right { \n        grid-column: 3; grid-row: 2; \n        background-image: url('textures/ui/right.png');\n    }\n    #action-right:active { background-image: url('textures/ui/right_pressed.png'); }\n\n    #action-back { \n        grid-column: 2; grid-row: 3; \n        background-image: url('textures/ui/down.png');\n    }\n    #action-back:active { background-image: url('textures/ui/down_pressed.png'); }\n\n    #top-btns {\n        position: absolute;\n        top: 20px;\n        left: 50%;\n        transform: translateX(-50%);\n        display: flex;\n        gap: 20px;\n    }\n\n    .top-btn {\n        width: 50px;\n        height: 50px;\n        background: rgba(0, 0, 0, 0.3);\n        border: 2px solid rgba(255, 255, 255, 0.2);\n        border-radius: 10px;\n        display: flex;\n        justify-content: center;\n        align-items: center;\n        backdrop-filter: blur(4px);\n    }\n\n    .top-btn svg { width: 30px; height: 30px; }\n    .top-btn:active { background: rgba(255, 255, 255, 0.2); }\n\n    #action-btns {\n        position: absolute;\n        bottom: 40px;\n        right: 40px;\n        display: flex;\n        flex-direction: column;\n        gap: 15px;\n        align-items: flex-end;\n    }\n\n    .abtn {\n        min-width: 90px;\n        padding: 12px 20px;\n        background: url('textures/block/stone.png');\n        background-size: cover;\n        image-rendering: pixelated;\n        border: 4px solid #000;\n        border-top-color: #fff;\n        border-left-color: #fff;\n        border-bottom-color: #555;\n        border-right-color: #555;\n        color: white;\n        font-size: 14px;\n        text-shadow: 1px 1px 2px black;\n        display: flex;\n        justify-content: center;\n        align-items: center;\n    }\n\n    .abtn:active {\n        filter: brightness(0.7);\n        transform: scale(0.95);\n    }\n\n    #action-jump {\n        width: 80px;\n        height: 80px;\n        background-image: url('textures/ui/jump.png');\n        background-size: 100% 100%;\n        border: none;\n        border-radius: 0;\n        padding: 0;\n    }\n    #action-jump:active {\n        background-image: url('textures/ui/jump_pressed.png');\n        transform: none;\n        filter: none;\n    }\n\n    @media (max-height: 500px) {\n        #dpad { bottom: 20px; left: 20px; transform: scale(0.8); transform-origin: bottom left; }\n        #action-btns { bottom: 20px; right: 20px; transform: scale(0.8); transform-origin: bottom right; }\n    }\n</style>"
